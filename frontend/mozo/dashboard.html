<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Mozo — ComandApp</title>
<link rel="stylesheet" href="../css/styles.css" />
<style>
  .welcome-mozo {
    text-align: center; margin-top: 2rem;
    font-family: 'Playfair Display', serif;
    font-size: 22px; color: var(--gold-light);
  }
  .welcome-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 2.5rem; }

  .big-btn-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.5rem; max-width: 560px; margin: 0 auto;
  }
  .big-btn {
    background: var(--bg2);
    border: 2px solid rgba(181,145,74,.22);
    border-radius: var(--radius-lg);
    padding: 2.75rem 1rem;
    text-align: center; cursor: pointer; text-decoration: none; color: var(--text);
    transition: all .22s; display: flex; flex-direction: column; align-items: center; gap: .85rem;
    position: relative;
  }
  .big-btn:hover { border-color: var(--gold); background: var(--bg3); transform: translateY(-4px); }
  .big-btn .bb-icon { font-size: 44px; }
  .big-btn .bb-label { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--gold-light); }
  .big-btn .bb-sub   { font-size: 12px; color: var(--muted); }

  /* Contador de comandas activas */
  .notif-badge {
    position: absolute; top: 14px; right: 14px;
    background: var(--warn); color: #fff;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .notif-badge.hidden { display: none; }

  @media (max-width: 500px) {
    .big-btn-grid { grid-template-columns: 1fr; max-width: 300px; }
  }
</style>
</head>
<body class="page-wrapper">

<header class="topbar">
  <a class="topbar-logo" href="dashboard.html"><div class="topbar-icon">🍽️</div> ComandApp</a>
  <div class="topbar-sep"></div>
  <div class="topbar-user">Hola, <strong id="topbar-name"></strong></div>
  <div class="topbar-avatar" id="topbar-avatar">M</div>
  <span id="topbar-role" class="topbar-role role-mozo">Mozo</span>
  <button class="btn-logout" onclick="logout()">Salir</button>
</header>

<main style="flex:1; padding: 1.75rem 2rem; overflow-y:auto;">
  <div class="welcome-mozo" id="bienvenida">Bienvenido</div>
  <p class="welcome-sub">¿Qué querés hacer?</p>

  <div class="big-btn-grid">
    <a class="big-btn" href="mesas.html">
      <div class="bb-icon">🪑</div>
      <div class="bb-label">Mesas</div>
      <div class="bb-sub">Ver todas las mesas y cargar comandas</div>
    </a>
    <a class="big-btn" href="comandas-activas.html" id="btn-comandas">
      <div class="notif-badge hidden" id="notif-count">0</div>
      <div class="bb-icon">📋</div>
      <div class="bb-label">Mis comandas</div>
      <div class="bb-sub">Ver el estado de tus comandas activas</div>
    </a>
  </div>
</main>

<div id="toast" class="toast"></div>

<script src="../js/api.js"></script>
<script>
  // Socket.IO desde CDN (mismo que el backend)
</script>
<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script>
const user = requireAuth(['mozo']);
if (user) {
  setupTopbar();
  document.getElementById('bienvenida').textContent = `Hola, ${user.nombre} 👋`;

  // Conectar Socket.IO y unirse a la sala personal del mozo
  const socket = io('http://localhost:3000');
  socket.emit('join', `mozo-${user.id}`);

  // Escuchar actualizaciones de sus comandas
  socket.on('comanda-actualizada', ({ id, estado }) => {
    const msgs = {
      aceptada:  '✓ Tu comanda fue aceptada por cocina',
      rechazada: '✕ Tu comanda fue rechazada por cocina',
      lista:     '🔔 Una comanda está lista para entregar',
    };
    if (msgs[estado]) toast(msgs[estado], estado === 'rechazada' ? 'error' : 'success', 5000);
    cargarContador();
  });

  cargarContador();
}

async function cargarContador() {
  try {
    const user   = getUser();
    const data   = await apiFetch(`/comandas/mozo/${user.id}`);
    const activas = data.filter(c => ['pendiente','aceptada','lista'].includes(c.estado));
    const badge  = document.getElementById('notif-count');
    if (activas.length > 0) {
      badge.textContent = activas.length;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  } catch(e) { /* silencioso */ }
}
</script>
</body>
</html>
