<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mis Comandas — ComandApp</title>
<link rel="stylesheet" href="../css/styles.css" />
<style>
  .cols-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; }
  .col-header { display:flex; align-items:center; gap:.5rem; margin-bottom:.75rem; padding-bottom:.5rem; border-bottom:1px solid rgba(181,145,74,.18); }
  .col-title  { font-family:'Playfair Display',serif; font-size:15px; color:var(--gold-light); }
  .col-count  { background:rgba(181,145,74,.18); color:var(--gold-light); border-radius:20px; padding:2px 8px; font-size:11px; }
  .paga-toggle {
    display:inline-flex; align-items:center; gap:.4rem;
    padding:.32rem .75rem; border-radius:20px; font-size:12px; font-weight:500;
    cursor:pointer; border:none; transition:all .18s;
  }
  .paga-toggle.no-paga { background:rgba(192,57,43,.15); color:#e57373; }
  .paga-toggle.no-paga:hover { background:rgba(192,57,43,.28); }
  .paga-toggle.paga     { background:rgba(39,174,96,.2); color:#6fd993; }
  .paga-toggle.paga:hover { background:rgba(39,174,96,.35); }
</style>
</head>
<body class="page-wrapper">

<header class="topbar">
  <a class="topbar-logo" href="dashboard.html"><div class="topbar-icon">🍽️</div> ComandApp</a>
  <div class="topbar-sep"></div>
  <div class="topbar-user">Hola, <strong id="topbar-name"></strong></div>
  <div class="topbar-avatar" id="topbar-avatar">M</div>
  <span class="topbar-role role-mozo">Mozo</span>
  <button class="btn-logout" onclick="logout()">Salir</button>
</header>

<div class="app-body">
  <nav class="sidebar">
    <div class="sidebar-label">Mozo</div>
    <a class="nav-item" href="dashboard.html"><span class="ni">🏠</span> Inicio</a>
    <a class="nav-item" href="mesas.html"><span class="ni">🪑</span> Mesas</a>
    <a class="nav-item active" href="comandas-activas.html"><span class="ni">📋</span> Mis comandas</a>
  </nav>

  <main class="main">
    <div class="page-header">
      <div><h1>Mis Comandas</h1><p>Estado en tiempo real de tus comandas activas</p></div>
      <button class="btn btn-outline" onclick="cargar()">↺ Actualizar</button>
    </div>

    <div class="cols-grid">
      <div>
        <div class="col-header"><span style="font-size:16px;">🕐</span><span class="col-title">Pendientes</span><span class="col-count" id="cnt-pendiente">0</span></div>
        <div id="col-pendiente"></div>
      </div>
      <div>
        <div class="col-header"><span style="font-size:16px;">👨‍🍳</span><span class="col-title">En cocina</span><span class="col-count" id="cnt-aceptada">0</span></div>
        <div id="col-aceptada"></div>
      </div>
      <div>
        <div class="col-header"><span style="font-size:16px;">🔔</span><span class="col-title">Listas para entregar</span><span class="col-count" id="cnt-lista">0</span></div>
        <div id="col-lista"></div>
      </div>
    </div>

    <div style="margin-top:1.5rem;">
      <div class="col-header">
        <span style="font-size:16px;">✕</span>
        <span class="col-title" style="color:#e57373;">Rechazadas</span>
        <span class="col-count" id="cnt-rechazada" style="background:rgba(192,57,43,.2);color:#e57373;">0</span>
      </div>
      <div id="col-rechazada"></div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>
<script src="../js/api.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const user = requireAuth(['mozo']);
if (user) setupTopbar();

let _data = [];

async function cargar() {
  try {
    _data = await apiFetch(`/comandas/mozo/${user.id}`);
    render();
  } catch(e) { toast(e.message,'error'); }
}

function render() {
  const estados = ['pendiente','aceptada','lista','rechazada'];
  estados.forEach(est => {
    const items = _data.filter(c => c.estado === est);
    document.getElementById('cnt-' + est).textContent = items.length;
    const col = document.getElementById('col-' + est);

    if (!items.length) {
      col.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:.75rem .5rem;">Sin comandas</div>`;
      return;
    }

    col.innerHTML = items.map(c => `
      <div class="comanda-card ${est === 'lista' ? 'nueva' : ''}">
        <div class="comanda-header">
          <span class="comanda-mesa">Mesa ${c.mesa_numero || '—'}</span>
          ${estadoBadge(c.estado)}
        </div>
        <div class="comanda-items">
          ${(c.items||[]).map(i=>`
            <div class="comanda-item">
              <span>${i.producto}</span>
              <span style="color:var(--muted);">x${i.cantidad}</span>
              <span style="color:var(--gold-light);">${formatPrecio(i.subtotal)}</span>
            </div>`).join('')}
        </div>
        ${c.observaciones ? `<div class="comanda-obs">📝 ${c.observaciones}</div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;">
          <span class="comanda-time">${tiempoRelativo(c.creado_en)}</span>
          <span class="comanda-total">${formatPrecio(c.total)}</span>
        </div>
        <div class="comanda-actions" style="margin-top:.6rem; flex-wrap:wrap;">
          ${est === 'lista' ? `
            <button class="btn btn-success btn-sm" onclick="marcarEntregada(${c.id})">✓ Entregar</button>
          ` : ''}
          ${(est === 'lista' || est === 'aceptada' || est === 'pendiente') ? `
            <button class="paga-toggle ${c.pagada ? 'paga' : 'no-paga'}" onclick="togglePagar(${c.id}, ${!c.pagada})">
              💳 ${c.pagada ? 'Paga ✓' : 'Sin pagar'}
            </button>
          ` : ''}
          ${est === 'rechazada' ? `
            <button class="btn btn-danger btn-sm" onclick="borrarComanda(${c.id})">🗑 Borrar</button>
          ` : ''}
        </div>
      </div>
    `).join('');
  });
}

async function marcarEntregada(id) {
  try {
    await apiFetch(`/comandas/${id}/estado`, { method:'PUT', body: JSON.stringify({ estado:'entregada' }) });
    toast('Comanda entregada');
    await cargar();
  } catch(e) { toast(e.message,'error'); }
}

async function togglePagar(id, nuevoPagada) {
  try {
    await apiFetch(`/comandas/${id}/pagar`, { method:'PUT', body: JSON.stringify({ pagada: nuevoPagada }) });
    const idx = _data.findIndex(c => c.id === id);
    if (idx !== -1) _data[idx].pagada = nuevoPagada;
    render();
    toast(nuevoPagada ? '💳 Comanda marcada como paga' : 'Comanda marcada como sin pagar');
  } catch(e) { toast(e.message,'error'); }
}

async function borrarComanda(id) {
  if (!confirm('¿Eliminar esta comanda rechazada?')) return;
  try {
    await apiFetch(`/comandas/${id}`, { method:'DELETE' });
    _data = _data.filter(c => c.id !== id);
    render();
    toast('Comanda eliminada');
  } catch(e) { toast(e.message,'error'); }
}

const socket = io('https://comandapp-tafel-1.onrender.com');
socket.emit('join', `mozo-${user.id}`);

socket.on('comanda-actualizada', ({ id, estado }) => {
  const idx = _data.findIndex(c => c.id === id);
  if (idx !== -1) { _data[idx].estado = estado; render(); }
  const msgs = {
    aceptada: '👨‍🍳 Tu comanda fue aceptada',
    rechazada:'✕ Cocina rechazó una comanda',
    lista:    '🔔 ¡Una comanda está lista para servir!',
  };
  if (msgs[estado]) toast(msgs[estado], estado === 'rechazada' ? 'error' : 'success', 5000);
});

cargar();
setInterval(cargar, 60000);
</script>
</body>
</html>
